<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beshoy & Selvia</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- Intro -->
<div class="intro" id="intro">
  <h2>💍 Wedding Invitation</h2>
  <p>Tap to Enter</p>
</div>

<!-- Audio -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊 Stop Music</button>

<!-- Main -->
<div class="main" id="main">

  <div class="section">
    <h2>Wedding Invitation</h2>
    <p>With hearts full of love and joy,<br>
    we invite you to celebrate our wedding</p>
  </div>

  <div class="section">
    <h1>Beshoy <span>&</span> Selvia</h1>
  </div>

  <div class="section">
    <p>Friday</p>
    <h2>May 15, 2026</h2>
    <p>7:30 PM</p>
  </div>

  <div class="section">
    <p>Saint Anthony Church - Zahraa El Maadi</p>
  </div>

  <!-- Countdown -->
  <div class="section countdown">
    <div><span id="days">0</span><p>Days</p></div>
    <div><span id="hours">0</span><p>Hours</p></div>
    <div><span id="minutes">0</span><p>Minutes</p></div>
    <div><span id="seconds">0</span><p>Seconds</p></div>
  </div>

  <div class="section">
    <a href="https://maps.app.goo.gl/RiXTgqJd3wtxQk5r7" target="_blank" class="map-btn">
      📍 Get Directions
    </a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
